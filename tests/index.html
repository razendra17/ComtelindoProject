<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Website</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    color:#DE5727;
}

p{
    color:#555;
}

button{
    background:#DE5727;
    border:none;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#c94e1f;
}
</style>

</head>
<body>

<div class="card">
    <h1>Website Berhasil 🎉</h1>
    <p>Hosting kamu sudah berjalan dengan baik.</p>
    <button onclick="alert('Hosting berhasil!')">Test Klik</button>
</div>

</body>
</html>
